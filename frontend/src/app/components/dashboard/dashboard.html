<app-navbar></app-navbar>

<div class="container py-5">
  <div class="text-center mb-5">
    <h1 class="fw-bold text-primary">⚽ Panel de Pronósticos</h1>
    <p class="text-muted fs-5">¡Hola, <span class="text-dark fw-bold">{{ nombreUsuario }}</span>! Digita tus marcadores y guarda cada apuesta antes del pitazo inicial.</p>
  </div>

  <div class="row g-4 justify-content-center">

    <div class="col-12 col-md-6 col-lg-4" *ngFor="let partido of partidos">
      <div class="card h-100 shadow-sm border-0 rounded-4 overflow-hidden">

        <div class="card-header bg-light border-0 py-3 text-center">
          <span class="badge bg-dark text-uppercase px-3 py-2 small">
            📅 {{ partido.fechaHora | date:'medium' }}
          </span>
        </div>

        <div class="card-body py-4 bg-light bg-opacity-25">
          <div class="d-flex align-items-center justify-content-between text-center">

            <div class="flex-grow-1 p-2 rounded-3 bg-white shadow-sm border-start border-primary border-3" style="width: 42%;">
              <p class="fw-bold mb-2 text-primary text-truncate d-flex align-items-center justify-content-center gap-2" [title]="partido.equipoLocal">
                <img [src]="partido.banderaLocal" [alt]="partido.equipoLocal" class="shadow-sm rounded-1" style="width: 28px; height: auto;">
                {{ partido.equipoLocal }}
              </p>
              <input type="number"
                     #golLocal
                     class="form-control form-control-lg text-center fw-bold border-2 rounded-3 mx-auto"
                     style="max-width: 75px; background-color: #f8f9fa;"
                     min="0"
                     value="0">
            </div>

            <div class="px-2 flex-shrink-0">
              <span class="badge bg-warning text-dark rounded-circle p-2 fw-bold shadow-sm">VS</span>
            </div>

            <div class="flex-grow-1 p-2 rounded-3 bg-white shadow-sm border-end border-success border-3" style="width: 42%;">
              <p class="fw-bold mb-2 text-success text-truncate d-flex align-items-center justify-content-center gap-2" [title]="partido.equipoVisitante">
                <img [src]="partido.banderaVisitante" [alt]="partido.equipoVisitante" class="shadow-sm rounded-1" style="width: 28px; height: auto;">
                {{ partido.equipoVisitante }}
              </p>
              <input type="number"
                     #golVisitante
                     class="form-control form-control-lg text-center fw-bold border-2 rounded-3 mx-auto"
                     style="max-width: 75px; background-color: #f8f9fa;"
                     min="0"
                     value="0">
            </div>

          </div>
        </div>

        <div class="card-footer bg-white border-0 pb-3 text-center">
          <button class="btn btn-primary btn-sm w-100 rounded-pill fw-bold py-2 shadow-sm"
                  (click)="guardarPronostico(partido.id, golLocal.value, golVisitante.value)">
            💾 Guardar Pronóstico
          </button>
        </div>

      </div>
    </div>

    <div class="col-12 text-center py-5" *ngIf="partidos.length === 0">
      <div class="spinner-border text-primary mb-3" role="status">
        <span class="visually-hidden">Cargando...</span>
      </div>
      <p class="text-muted fs-5">Conectando con el servidor de la Polla Mundial...</p>
    </div>

  </div>
</div>
