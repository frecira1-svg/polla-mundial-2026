<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg border-0 p-4 rounded-4" style="max-width: 450px; width: 100%;">

    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">⚽ La Polla Mundial</h2>
      <p class="text-muted">Inicia sesión para registrar tus pronósticos</p>
    </div>

    @if (errorMessage) {
      <div class="alert alert-danger rounded-3 text-center py-2 small" role="alert">
        ❌ {{ errorMessage }}
      </div>
    }

    @if (successMessage) {
      <div class="alert alert-success rounded-3 text-center py-2 small" role="alert">
        🎉 {{ successMessage }}
      </div>
    }

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">

      <div class="mb-3">
        <label for="email" class="form-label fw-semibold text-secondary">Correo Electrónico</label>
        <input type="email"
       id="email"
       name="email"
       autocomplete="username" class="form-control form-control-lg rounded-3"
       placeholder="ejemplo@correo.com"
       [(ngModel)]="email"
       required>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label fw-semibold text-secondary">Contraseña</label>
        <input type="password"
               id="password"
               name="password"
               autocomplete="current-password"
               placeholder="••••••••"
               class="form-control form-control-lg rounded-3"
               [(ngModel)]="password"
               required>
      </div>

      <button type="submit"
              class="btn btn-primary btn-lg w-100 rounded-3 fw-bold py-2"
              [disabled]="!loginForm.form.valid">
        Ingresar
        <button type="submit"
              class="btn btn-primary btn-lg w-100 rounded-3 fw-bold py-2 mb-3"
              [disabled]="!loginForm.form.valid">
        Ingresar
      </button>

      <div class="text-center mt-3">
        <p class="mb-0 text-muted small">¿No tienes una cuenta aún?</p>
        <a routerLink="/registro" class="text-primary fw-bold text-decoration-none small">
          📝 Regístrate aquí gratis
        </a>
      </div>
      </button>

    </form>

  </div>
</div>
