<app-navbar></app-navbar>

<div class="container py-5">
  <div class="text-center mb-5">
    <h1 class="fw-bold text-danger">⚙️ Panel de Administración</h1>
    <p class="text-muted fs-5">Digita los marcadores reales oficiales de los partidos para actualizar la tabla de posiciones.</p>
  </div>

  <div class="row g-4 justify-content-center">

    <div class="col-12 col-md-6 col-lg-4" *ngFor="let partido of partidos">
      <div class="card h-100 shadow-sm border-top border-danger border-3 rounded-4 overflow-hidden">

        <div class="card-header bg-light border-0 py-3 text-center">
          <span class="badge bg-dark text-uppercase px-3 py-2 small">
            Partido #{{ partido.id }}
          </span>
        </div>

        <div class="card-body py-4">
          <div class="d-flex align-items-center justify-content-between text-center">

            <div class="flex-grow-1 px-1" style="width: 42%;">
              <p class="fw-bold mb-2 text-dark text-truncate">{{ partido.equipo_local }}</p>
              <input type="number"
                     #resLocal
                     class="form-control form-control-lg text-center fw-bold rounded-3 mx-auto shadow-sm"
                     style="max-width: 75px; border-color: #dc3545;"
                     min="0"
                     [value]="partido.goles_local_real !== null ? partido.goles_local_real : 0">
            </div>

            <div class="px-2 fw-bold text-danger small flex-shrink-0">VS</div>

            <div class="flex-grow-1 px-1" style="width: 42%;">
              <p class="fw-bold mb-2 text-dark text-truncate">{{ partido.equipo_visitante }}</p>
              <input type="number"
                     #resVisitante
                     class="form-control form-control-lg text-center fw-bold rounded-3 mx-auto shadow-sm"
                     style="max-width: 75px; border-color: #dc3545;"
                     min="0"
                     [value]="partido.goles_visitante_real !== null ? partido.goles_visitante_real : 0">
            </div>

          </div>
        </div>

        <div class="card-footer bg-white border-0 pb-3 text-center">
          <button class="btn btn-danger btn-sm w-100 rounded-pill fw-bold py-2 shadow-sm"
                  (click)="guardarResultadoReal(partido.id, resLocal.value, resVisitante.value)">
            📢 Publicar Resultado Oficial
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
